name: Android Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: android-release-${{ github.sha }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          existing_tag="$(git tag --points-at HEAD "v*" | head -n 1 || true)"
          if [ -n "$existing_tag" ]; then
            echo "Using existing tag: $existing_tag"
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l "v*" --sort=-v:refname | head -n 1 || true)"
          if [ -z "$latest_tag" ]; then
            next_number=1001
          else
            latest_number="${latest_tag#v}"
            next_number=$((latest_number + 1))
          fi

          tag="v${next_number}"
          while git rev-parse "$tag" >/dev/null 2>&1; do
            next_number=$((next_number + 1))
            tag="v${next_number}"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate signing secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Release signing is required. Configure repository secrets before running release workflow."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare keystore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .secure
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > .secure/release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release bundle artifacts
        run: |
          ./gradlew :core:assembleRelease \
            :updater:assembleRelease \
            :contacts:assembleRelease \
            :messaging:assembleRelease \
            :agenttest:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.secure/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Package release files
        run: |
          mkdir -p out
          cp contacts/build/outputs/apk/release/*.apk out/contacts-release.apk || true
          cp messaging/build/outputs/apk/release/*.apk out/messaging-release.apk || true
          cp agenttest/build/outputs/apk/release/*.apk out/agenttest-release.apk || true
          cp core/build/outputs/aar/core-release.aar out/core-release.aar || true
          cp updater/build/outputs/aar/updater-release.aar out/updater-release.aar || true

      - name: Cleanup keystore
        if: always()
        run: rm -rf .secure

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: out/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: out/*
          generate_release_notes: true

