name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release bundle artifacts
        run: |
          ./gradlew :core:assembleRelease \
            :updater:assembleRelease \
            :contacts:assembleDebug \
            :messaging:assembleDebug \
            :agenttest:assembleDebug

      - name: Package release files
        run: |
          mkdir -p out
          cp contacts/build/outputs/apk/debug/*.apk out/contacts-debug.apk || true
          cp messaging/build/outputs/apk/debug/*.apk out/messaging-debug.apk || true
          cp agenttest/build/outputs/apk/debug/*.apk out/agenttest-debug.apk || true
          cp core/build/outputs/aar/core-release.aar out/core-release.aar || true
          cp updater/build/outputs/aar/updater-release.aar out/updater-release.aar || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: out/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true

